name: Delete merged branch

# When a pull request targeting main is merged, delete its feature (head) branch.
on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  delete-branch:
    # Only run for PRs that were actually merged (not just closed).
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Delete feature branch
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const headRepoId = context.payload.pull_request.head.repo.id;
            const baseRepoId = context.payload.pull_request.base.repo.id;
            const branch = context.payload.pull_request.head.ref;

            // Skip branches that live in a fork.
            if (headRepoId !== baseRepoId) {
              core.info(`Head branch '${branch}' is on a fork; skipping.`);
              return;
            }

            // Never delete protected long-lived branches.
            const protectedBranches = ['main', 'master', 'develop'];
            if (protectedBranches.includes(branch)) {
              core.info(`Branch '${branch}' is protected; skipping.`);
              return;
            }

            try {
              await github.rest.git.deleteRef({ owner, repo, ref: `heads/${branch}` });
              core.info(`Deleted branch '${branch}'.`);
            } catch (error) {
              if (error.status === 422) {
                core.info(`Branch '${branch}' already deleted.`);
              } else {
                throw error;
              }
            }
